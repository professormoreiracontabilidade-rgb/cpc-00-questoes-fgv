s financeiros para fins gerais, de acordo com o Pronunciamento, assinale a afirmativa correta.", "alternativas": {"a": "Destinam-se a apresentar o valor da entidade que reportam.", "b": "Baseiam -se em representações exatas e precisas do que se propõem a apresentar.", "c": "São completos, de modo que os usuários não precisam considerar informações de outras fontes.", "d": "Incluem informações adicionais que são úteis a um subconjunto específico de principais usuários.", "e": "Não são do interesse da administração da entidade que reporta, uma vez que esta obtém, internamente, as informações financeiras de que precisa."}, "gabarito": "D", "comentario": "A alternativa correta é a letra D: Incluem informações adicionais que são úteis a um subconjunto específico de principais usuários.. Os usuários primários são investidores, credores por empréstimos e outros credores, existentes e potenciais. A administração não é usuária primária, pois pode obter internamente as informações de que necessita."}, {"numero": 70, "banca": "FGV", "concurso": "Ana MP (MPE GO)/MPE GO/Analista Contábil/2022", "enunciado": "De acordo com o Pronunciamento Técnico CPC 00 (R2) - Estrutura Conceitual para Relatório Financeiro, os investidores, credores por empréstimos e outros credores existentes e potenciais são os principais usuários aos que se destinam os relatórios financeiros para fins gerais, uma vez que muitos deles", "alternativas": {"a": "têm interesse pelos relatórios como um todo.", "b": "necessitam de informações precisas para basear a sua tomada de decisão.", "c": "podem ter outra localização geográfica, necessitando de parâmetros de informação diferenciada.", "d": "são os responsáveis por grande parte do financiamento das entidades que reportam.", "e": "não podem exigir que as entidades que reportam forneçam informações diretamente a eles."}, "gabarito": "E", "comentario": "A alternativa correta é a letra E: não podem exigir que as entidades que reportam forneçam informações diretamente a eles.. Os usuários primários são investidores, credores por empréstimos e outros credores, existentes e potenciais. A administração não é usuária primária, pois pode obter internamente as informações de que necessita."}, {"numero": 71, "banca": "FGV", "concurso": "AJ (TJDFT)/TJDFT/Apoio Especializado/Contabilidade/2022", "enunciado": "As características qualitativas da informação financeira útil identificam os tipos de informações que tendem a ser mais úteis a investidores e credores para que tomem decisões sobre a entidade. A tratar de tais características, o texto da Estrutura Conceitual afirma que:", "alternativas": {"a": "a representação neutra da informação contábil reduz a capacidade de julgamento dos usuários;", "b": "a utilidade das informações financeiras é aumentada se elas forem materiais;", "c": "o custo é uma restrição generalizada sobre a capacidade da entidade de fornecer informações financeiras úteis;", "d": "o valor confirmatório é um atributo das informações financeiras quando elas são compreensíveis;", "e": "o valor preditivo é um atributo das informações financeiras quando elas são tempestivas."}, "gabarito": "C", "comentario": "A alternativa correta é a letra C: o custo é uma restrição generalizada sobre a capacidade da entidade de fornecer informações financeiras úteis;. Os usuários primários são investidores, credores por empréstimos e outros credores, existentes e potenciais. A administração não é usuária primária, pois pode obter internamente as informações de que necessita."}, {"numero": 72, "banca": "FGV", "concurso": "AJ TRT16/TRT 16/Administrativa/Contabilidade/2022", "enunciado": "De acordo com a NBC TG Estrutura Conceitual-Estrutura Conceitual para Relatório Financeiro, entre as finalidades da Estrutura Conceitual está", "alternativas": {"a": "compatibilizar as normas contábeis com as tributárias.", "b": "indicar aos usuários a melhor estratégia de alocação de recursos.", "c": "determinar a adoção da melhor política contábil relacionada a uma transação.", "d": "alterar o texto de um pronunciamento contábil já emitido quando forem verificadas possibilidades de melhoria.", "e": "auxiliar o desenvolvimento das normas internacionais de contabilidade para que tenham base em conceitos consistentes."}, "gabarito": "E", "comentario": "A alternativa correta é a letra E: auxiliar o desenvolvimento das normas internacionais de contabilidade para que tenham base em conceitos consistentes.. A questão cobra conceito do CPC 00. A resolução exige identificar a palavra-chave do enunciado e relacioná-la ao conceito técnico correto."}, {"numero": 73, "banca": "FGV", "concurso": "AJ TRT16/TRT 16/Administrativa/Contabilidade/2022", "enunciado": "O objetivo do relatório financeiro para fins gerais é fornecer informações financeiras sobre a entidade que reporta que sejam úteis a seus principais usuários, conforme definidos na norma, em sua tomada de decisões. Entre essas decisões está", "alternativas": {"a": "oferecer bonificações aos colaboradores.", "b": "precificar os produtos e serviços oferecidos.", "c": "reconhecer e adotar as melhores práticas contábeis.", "d": "determinar o melhor mix de produtos a serem vendidos.", "e": "conceder ou liquidar empréstimos ou outras formas de crédito."}, "gabarito": "E", "comentario": "A alternativa correta é a letra E: conceder ou liquidar empréstimos ou outras formas de crédito.. Pelo CPC 00, o objetivo do relatório financeiro para fins gerais é fornecer informações financeiras úteis sobre a entidade que reporta aos usuários primários, para decisões relacionadas à oferta de recursos à entidade."}, {"numero": 74, "banca": "FGV", "concurso": "AJ TRT16/TRT 16/Administrativa/Contabilidade/2022", "enunciado": "De acordo com a NBC TG Estrutura Conceitual- Estrutura Conceitual para Relatório Financeiro, ativo é um recurso econômico presente controlado pela entidade como resultado de eventos passados, sendo que recurso econômico é um direito que tem o potencial de produzir benefícios econômicos. Um direito que tem o potencial de produzir benefícios econômicos e que não corresponde à obrigação de outra parte são os direitos de", "alternativas": {"a": "receber caixa.", "b": "utilizar propriedade intelectual.", "c": "receber produtos ou serviços.", "d": "trocar recursos econômicos com outra parte em condições favoráveis.", "e": "beneficiar-se de obrigação de outra parte para transferir um recurso econômico se ocorrer evento futuro incerto especificado."}, "gabarito": "B", "comentario": "A alternativa correta é a letra B: utilizar propriedade intelectual.. Ativo é recurso econômico presente controlado pela entidade como resultado de eventos passados. O foco é o controle do recurso, não necessariamente a propriedade legal."}, {"numero": 75, "banca": "FGV", "concurso": "AJ TRT16/TRT 16/Administrativa/Contabilidade/2022", "enunciado": "O primeiro critério para a existência de um passivo é que a entidade tenha a obrigação. Em relação à obrigação, assinale a afirmativa correta.", "alternativas": {"a": "Deve ser estabelecida por contrato.", "b": "Depende de ação passada praticada pela entidade.", "c": "É devida à outra parte, cuja identidade deve ser conhecida.", "d": "Representa o dever ou responsabilidade que a entidade não tem a capacidade prática de evitar.", "e": "Para que um valor específico seja reconhecido e mensurado, deve haver reconhecimento de um ativo por outra parte pelo mesmo valor."}, "gabarito": "D", "comentario": "A alternativa correta é a letra D: Representa o dever ou responsabilidade que a entidade não tem a capacidade prática de evitar.. Passivo é obrigação presente da entidade de transferir recurso econômico como resultado de eventos passados. A obrigação é presente, ainda que a liquidação possa ocorrer no futuro."}, {"numero": 76, "banca": "FGV", "concurso": "AJ TRT16/TRT 16/Administrativa/Contabilidade/2022", "enunciado": "De acordo com a NBC TG Estrutura Conceitual- Estrutura Conceitual para Relatório Financeiro, patrimônio líquido é a participação residual nos ativos da entidade após a dedução", "alternativas": {"a": "do capital próprio.", "b": "de todos os seus passivos.", "c": "da distribuição do resultado.", "d": "das despesas reconhecidas no período.", "e": "do saldo entre as receitas e as despesas."}, "gabarito": "B", "comentario": "A alternativa correta é a letra B: de todos os seus passivos.. Ativo é recurso econômico presente controlado pela entidade como resultado de eventos passados. O foco é o controle do recurso, não necessariamente a propriedade legal."}, {"numero": 77, "banca": "FGV", "concurso": "AJ TRT16/TRT 16/Administrativa/Contabilidade/2022", "enunciado": "Segundo a NBC TG Estrutura Conceitual- Estrutura Conceitual para Relatório Financeiro, as receitas e as despesas são os elementos das demonstrações contábeis de uma entidade que se referem a(o)", "alternativas": {"a": "Posição financeira.", "b": "Posição econômica.", "c": "Situação patrimonial.", "d": "Desempenho financeiro.", "e": "Desempenho econômico."}, "gabarito": "D", "comentario": "A alternativa correta é a letra D: Desempenho financeiro.. Receitas aumentam o patrimônio líquido por aumento de ativos ou redução de passivos, exceto contribuições dos sócios. Despesas reduzem o patrimônio líquido por redução de ativos ou aumento de passivos, exceto distribuições aos sócios."}, {"numero": 78, "banca": "FGV", "concurso": "AJ TRT16/TRT 16/Administrativa/Contabilidade/2022", "enunciado": "As receitas são aumentos nos ativos ou reduções nos passivos que resultam em aumentos no patrimônio líquido, com exceção", "alternativas": {"a": "dos ganhos.", "b": "das variações monetárias.", "c": "dos tributos sobre os lucros.", "d": "das que acontecem de modo não recorrente.", "e": "das contribuições de detentores de direitos sobre o patrimônio."}, "gabarito": "E", "comentario": "A alternativa correta é a letra E: das contribuições de detentores de direitos sobre o patrimônio.. Ativo é recurso econômico presente controlado pela entidade como resultado de eventos passados. O foco é o controle do recurso, não necessariamente a propriedade legal."}, {"numero": 79, "banca": "FGV", "concurso": "AJ TRT16/TRT 16/Administrativa/Contabilidade/2022", "enunciado": "De acordo com a NBC TG Estrutura Conceitual- Estrutura Conceitual para Relatório Financeiro, as decisões sobre o reconhecimento dos ativos e dos passivos no balanço patrimonial são restringidas", "alternativas": {"a": "pelo tempo.", "b": "pelo custo.", "c": "pelo uso de estimativas.", "d": "pelo julgamento da administração.", "e": "pela complexidade das transações."}, "gabarito": "B", "comentario": "A alternativa correta é a letra B: pelo custo.. Ativo é recurso econômico presente controlado pela entidade como resultado de eventos passados. O foco é o controle do recurso, não necessariamente a propriedade legal."}, {"numero": 80, "banca": "FGV", "concurso": "AT (TCE TO)/TCE TO/Ciências Contábeis/2022", "enunciado": "O princípio da prudência é fundamental na contabilidade porque aumenta a confiança de diversos stakeholders. Assim, segundo o CPC 00 (R2), a prudência pode ser conceituada como o(a):", "alternativas": {"a": "atribuição de menor valor para as receitas e maior valor para as despesas;", "b": "superavaliação de ativos e a subavaliação de passivos;", "c": "exercício de cautela ao fazer julgamentos sob condições de incerteza;", "d": "componente do patrimônio que tenha seu registro inicial efetuado pelo valor ocorrido na data da transação com o mundo exterior à entidade;", "e": "separação do patrimônio da entidade e de seus respectivos sócios."}, "gabarito": "C", "comentario": "A alternativa correta é a letra C: exercício de cautela ao fazer julgamentos sob condições de incerteza;. A representação fidedigna exige informação completa, neutra e isenta de erros. Informação falsa, incompleta ou enviesada não representa fielmente o fenômeno econômico."}, {"numero": 81, "banca": "FGV", "concurso": "AJ TRT13/TRT 13/Administrativa/Contabilidade/2022", "enunciado": "De acordo com a NBC TG Estrutura Conceitual- Estrutura Conceitual para Relatório Financeiro, em uma entidade, um ativo deve", "alternativas": {"a": "ter liquidez.", "b": "ser mensurado pelo custo.", "c": "relacionar-se com os proprietários da entidade.", "d": "apresentar o potencial de produzir benefícios econômicos.", "e": "representar um recurso financeiro para a entidade que o apresenta."}, "gabarito": "D", "comentario": "A alternativa correta é a letra D: apresentar o potencial de produzir benefícios econômicos.. Ativo é recurso econômico presente controlado pela entidade como resultado de eventos passados. O foco é o controle do recurso, não necessariamente a propriedade legal."}, {"numero": 82, "banca": "FGV", "concurso": "Per Cri (PCA AP)/PCA AP/Ciências Contábeis/2022", "enunciado": "De acordo com o Pronunciamento Técnico CPC 00 (R2)- Estrutura Conceitual para Relatório Financeiro, o custo é uma restrição generalizada sobre as informações que podem ser fornecidas pelo relatório financeiro. No entanto, devido à subjetividade inerente, as avaliações de diferentes indivíduos sobre os custos e benefícios da apresentação de itens específicos de informações financeiras variam. Nesse caso, procura-se", "alternativas": {"a": "enfatizar os esforços envolvidos na análise e interpretação das informações fornecidas.", "b": "considerar custos e benefícios em relação ao relatório financeiro, de modo geral.", "c": "considerar todos os custos e benefícios individualmente, de acordo com as entidades que reportam.", "d": "considerar custos e benefícios conforme os interesses dos usuários primários do relatório financeiro.", "e": "enfatizar os esforços envolvidos na coleta, processamento, verificação e disseminação de informações financeiras."}, "gabarito": "B", "comentario": "A alternativa correta é a letra B: considerar custos e benefícios em relação ao relatório financeiro, de modo geral.. O custo é uma restrição generalizada sobre a informação financeira. Os benefícios de fornecer a informação devem justificar os custos de preparação, divulgação, verificação e análise."}, {"numero": 83, "banca": "FGV", "concurso": "Per Cri (PCA AP)/PCA AP/Ciências Contábeis/2022", "enunciado": "O custo histórico de um ativo adquirido é o valor dos custos incorridos em sua aquisição, compreendendo a contraprestação paga para adquirir o ativo e os custos de transação. O custo histórico do ativo é atualizado ao longo do tempo para refletir, se aplicável, os seguintes fatos à exceção de um. Assinale-o.", "alternativas": {"a": "pagamentos recebidos que extinguem a totalidade ou parte do ativo.", "b": "o consumo da totalidade ou parte do recurso econômico que constitui o ativo.", "c": "a provisão de juros que reflete qualquer componente de financiamento do ativo.", "d": "a variação do poder aquisitivo médio da moeda brasileira.", "e": "o efeito de eventos que fazem com que a totalidade ou parte do custo histórico do ativo não seja mais recuperável."}, "gabarito": "D", "comentario": "A alternativa correta é a letra D: a variação do poder aquisitivo médio da moeda brasileira.. Tempestividade significa disponibilizar informações aos tomadores de decisão a tempo de influenciar suas decisões. Quando a informação chega tarde, sua utilidade diminui."}, {"numero": 84, "banca": "FGV", "concurso": "Ana Esp (IMBEL)/IMBEL/Analista Contábil/2021", "enunciado": "De acordo com o Pronunciamento Técnico CPC 00 – Estrutura Conceitual para Relatório Financeiro, a compreensibilidade é uma das características qualitativas de melhoria de informações financeiras úteis. Em relação às implicações da característica qualitativa da compreensibilidade, assinale a afirmativa correta.", "alternativas": {"a": "Os usuários devem poder identificar e compreender similaridades e diferenças entre itens.", "b": "Os fenômenos complexos e de difícil compreensão devem ser excluídos dos relatórios financeiros.", "c": "As informações devem ser disponibilizadas aos tomadores de decisões a tempo para que sejam capazes de influenciar suas decisões.", "d": "As informações devem ser evidenciadas de modo que os usuários não precisem buscar o auxílio de consultores para compreender os relatórios financeiros.", "e": "Os relatórios financeiros devem ser elaborados para usuários que têm conhecimento razoável das atividades comerciais e econômicas e que revisam e analisam as informações de modo diligente."}, "gabarito": "E", "comentario": "A alternativa correta é a letra E: Os relatórios financeiros devem ser elaborados para usuários que têm conhecimento razoável das atividades comerciais e econômicas e que revisam e analisam as informações de modo diligente.. Compreensibilidade exige apresentação clara e concisa, considerando usuários com conhecimento razoável e que analisam as informações com diligência."}, {"numero": 85, "banca": "FGV", "concurso": "Ana Esp (IMBEL)/IMBEL/Analista Contábil/2021", "enunciado": "De acordo com o Pronunciamento Técnico CPC 00 – Estrutura Conceitual para Relatório Financeiro, assinale a opção que apresenta uma restrição generalizada sobre as informações que podem ser fornecidas em relatório financeiro.", "alternativas": {"a": "O tempo.", "b": "O custo.", "c": "A subjetividade.", "d": "Os recursos limitados.", "e": "A quantidade de normas."}, "gabarito": "B", "comentario": "A alternativa correta é a letra B: O custo.. A questão cobra conceito do CPC 00. A resolução exige identificar a palavra-chave do enunciado e relacioná-la ao conceito técnico correto."}, {"numero": 86, "banca": "FGV", "concurso": "Sup (IMBEL)/IMBEL/Contador/2021", "enunciado": "De acordo com o Pronunciamento Técnico CPC 00 – Estrutura Conceitual para Relatório Financeiro, as informações financeiras relevantes são capazes de fazer diferença nas decisões tomadas pelos usuários e podem ter valor preditivo. Em relação às informações financeiras relevantes com valor preditivo, assinale a afirmativa correta.", "alternativas": {"a": "Confirmam ou alter const KEY = 'pm_quiz_cpc00_100_fgv_powerpoint_azul_v1';

let state = JSON.parse(localStorage.getItem(KEY) || '{}');
state = Object.assign({idx:0, answers:Array(questions.length).fill(null), seconds:0}, state);
if(!Array.isArray(state.answers) || state.answers.length !== questions.length) state.answers = Array(questions.length).fill(null);

const $ = id => document.getElementById(id);

function save(){
  localStorage.setItem(KEY, JSON.stringify(state));
}

function pad(n){ return String(n).padStart(2,'0'); }
function timeFmt(s){
  const m = Math.floor(s/60), sec = s%60;
  return pad(m) + ':' + pad(sec);
}

function counts(){
  let right = 0, wrong = 0;
  questions.forEach((q,i) => {
    if(state.answers[i]) {
      if(state.answers[i] === q.gabarito) right++;
      else wrong++;
    }
  });
  return {right, wrong};
}

function adjustScroll(){
  const q = $('questionText');
  const ops = $('options');
  q.classList.remove('scrollable');
  ops.classList.remove('scrollable');
  requestAnimationFrame(() => {
    if(q.scrollHeight > q.clientHeight + 6) q.classList.add('scrollable');
    if(ops.scrollHeight > ops.clientHeight + 6) ops.classList.add('scrollable');
  });
}

function render(){
  const q = questions[state.idx];
  const c = counts();

  $('quizContent').style.display = 'grid';
  $('finalScreen').classList.remove('show');

  $('qCounter').textContent = (state.idx+1) + '/' + questions.length;
  $('rightCounter').textContent = c.right;
  $('wrongCounter').textContent = c.wrong;
  $('timer').textContent = timeFmt(state.seconds);

  $('banca').textContent = q.banca || 'FGV';
  $('concurso').textContent = q.concurso || 'Concurso';
  $('questionText').textContent = q.numero + ') ' + q.enunciado;

  const letters = ['a','b','c','d','e'];
  $('options').innerHTML = '';
  letters.forEach(letter => {
    if(!q.alternativas[letter]) return;
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.innerHTML = '<strong>' + letter.toUpperCase() + ')</strong> ' + q.alternativas[letter];
    btn.onclick = () => answer(letter.toUpperCase());
    if(state.answers[state.idx]) {
      if(letter.toUpperCase() === q.gabarito) btn.classList.add('correct');
      if(letter.toUpperCase() === state.answers[state.idx] && state.answers[state.idx] !== q.gabarito) btn.classList.add('wrong');
    }
    $('options').appendChild(btn);
  });

  const ans = state.answers[state.idx];
  const light = $('light');
  const comment = $('comment');

  if(ans) {
    const ok = ans === q.gabarito;
    light.className = 'light ' + (ok ? (state.idx % 2 === 0 ? 'good' : 'blue') : 'bad');
    light.textContent = ok ? '✅ ACERTOU!' : '❌ ERROU!';
    comment.className = 'comment show';
    comment.innerHTML = '<strong>Comentário:</strong> ' + q.comentario;
  } else {
    light.className = 'light';
    light.textContent = '';
    comment.className = 'comment';
    comment.innerHTML = '';
  }

  buildGrid();
  save();
  adjustScroll();
}

function answer(letter){
  if(state.answers[state.idx]) return;
  state.answers[state.idx] = letter;
  render();
}

function nextQuestion(){
  if(state.idx < questions.length - 1) {
    state.idx++;
    render();
  } else {
    showFinal();
  }
}

function prevQuestion(){
  if(state.idx > 0) {
    state.idx--;
    render();
  }
}

function showFinal(){
  const c = counts();
  const total = c.right + c.wrong;
  const pct = total ? Math.round((c.right/total)*100) : 0;
  $('quizContent').style.display = 'none';
  $('finalScreen').classList.add('show');
  $('finalRight').textContent = '✅ Acertos: ' + c.right;
  $('finalWrong').textContent = '❌ Erros: ' + c.wrong;
  $('finalPercent').textContent = '📊 Aproveitamento: ' + pct + '%';
}

function restartQuiz(){
  if(confirm('Deseja reiniciar o quiz?')) {
    localStorage.removeItem(KEY);
    state = {idx:0, answers:Array(questions.length).fill(null), seconds:0};
    $('gridPanel').classList.remove('show');
    render();
  }
}

function toggleGrid(){
  $('gridPanel').classList.toggle('show');
  buildGrid();
}

function goTo(i){
  state.idx = i;
  $('gridPanel').classList.remove('show');
  render();
}

function buildGrid(){
  const grid = $('grid');
  grid.innerHTML = '';
  questions.forEach((q,i) => {
    const b = document.createElement('button');
    b.textContent = i+1;
    if(i === state.idx) b.classList.add('current');
    if(state.answers[i]) {
      if(state.answers[i] === q.gabarito) b.classList.add('ok');
      else b.classList.add('no');
    }
    b.onclick = () => goTo(i);
    grid.appendChild(b);
  });
}

document.addEventListener('keydown', e => {
  if(e.key === 'ArrowRight') nextQuestion();
  if(e.key === 'ArrowLeft') prevQuestion();
  const key = e.key.toUpperCase();
  if(['A','B','C','D','E'].includes(key)) answer(key);
});

window.addEventListener('resize', adjustScroll);

setInterval(() => {
  state.seconds++;
  $('timer').textContent = timeFmt(state.seconds);
  save();
}, 1000);

render();
</script>
