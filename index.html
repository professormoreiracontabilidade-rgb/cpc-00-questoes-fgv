<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz PowerPoint CPC 00 – 100 Questões FGV</title>
<style>
:root{
  --blue-bg-1:#1E3A8A;
  --blue-bg-2:#2563EB;
  --blue-bg-3:#3B82F6;
  --blue-soft:#DBEAFE;
  --blue-mid:#2563EB;
  --green:#16A34A;
  --green-light:#DCFCE7;
  --red:#DC2626;
  --red-light:#FEE2E2;
  --white:#FFFFFF;
  --dark:#0F172A;
  --gold:#FBBF24;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{
  width:100%;
  min-height:100%;
  font-family:Arial,Helvetica,sans-serif;
  background:linear-gradient(135deg,var(--blue-bg-1),var(--blue-bg-2));
  color:#fff;
}
body{
  display:flex;
  align-items:center;
  justify-content:center;
  padding:12px;
  overflow:hidden;
}
.stage{
  width:min(97vw,1366px);
  aspect-ratio:16/9;
  max-height:97vh;
  background:linear-gradient(145deg,#1E40AF,#2563EB 55%,#3B82F6);
  border:4px solid rgba(255,255,255,.18);
  border-radius:28px;
  box-shadow:0 28px 70px rgba(0,0,0,.38);
  display:flex;
  flex-direction:column;
  padding:18px 22px;
  position:relative;
  overflow:hidden;
}
.stage::before{
  content:"";
  position:absolute;
  inset:-120px;
  background:radial-gradient(circle at top right,rgba(255,255,255,.22),transparent 38%),
             radial-gradient(circle at bottom left,rgba(219,234,254,.24),transparent 35%);
  pointer-events:none;
}
.header,.content,.footer,.question-grid{position:relative;z-index:1}
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:16px;
  border-bottom:1px solid rgba(255,255,255,.20);
  padding-bottom:10px;
}
.course h1{
  font-size:24px;
  font-weight:900;
  text-transform:uppercase;
  letter-spacing:.3px;
}
.course p{
  font-size:14px;
  color:#DBEAFE;
  font-weight:800;
  margin-top:4px;
}
.score{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
  min-width:460px;
}
.scorebox{
  background:rgba(255,255,255,.14);
  border:1px solid rgba(255,255,255,.22);
  border-radius:15px;
  padding:8px 9px;
  text-align:center;
}
.scorebox span{
  display:block;
  font-size:11px;
  color:#DBEAFE;
  font-weight:800;
}
.scorebox strong{
  font-size:20px;
  color:#fff;
}
.content{
  flex:1;
  min-height:0;
  display:grid;
  grid-template-columns:1.05fr .95fr;
  gap:14px;
  padding:14px 0 12px;
}
.card{
  background:rgba(255,255,255,.97);
  color:#0F172A;
  border-radius:25px;
  box-shadow:0 18px 48px rgba(0,0,0,.28);
  border:3px solid rgba(219,234,254,.85);
  padding:18px;
  display:flex;
  flex-direction:column;
  min-height:0;
}
.meta{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-bottom:10px;
  flex:0 0 auto;
}
.badge{
  background:#DBEAFE;
  color:#1E3A8A;
  border-radius:99px;
  padding:7px 10px;
  font-size:11px;
  font-weight:900;
}
.question-text{
  flex:1;
  min-height:0;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  color:#0F172A;
  font-size:clamp(15px,1.18vw,21px);
  line-height:1.23;
  font-weight:850;
  text-align:center;
}
.question-text.scrollable{
  display:block;
  overflow-y:auto;
  text-align:left;
  padding-right:4px;
}
.options{
  flex:1;
  min-height:0;
  display:grid;
  gap:8px;
  overflow:hidden;
}
.options.scrollable{
  overflow-y:auto;
  padding-right:4px;
}
.option{
  border:3px solid rgba(37,99,235,.18);
  background:#EFF6FF;
  color:#0F172A;
  border-radius:16px;
  padding:9px 11px;
  text-align:left;
  font-size:clamp(13px,1vw,17px);
  line-height:1.18;
  font-weight:800;
  cursor:pointer;
  transition:.15s;
}
.option:hover{
  transform:translateY(-1px);
  border-color:#60A5FA;
}
.option.correct{
  background:#DCFCE7;
  border-color:#16A34A;
  color:#14532D;
  box-shadow:0 0 0 5px rgba(22,163,74,.18);
}
.option.wrong{
  background:#FEE2E2;
  border-color:#DC2626;
  color:#7F1D1D;
  box-shadow:0 0 0 5px rgba(220,38,38,.16);
}
.light{
  min-height:50px;
  border-radius:18px;
  margin-top:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:25px;
  font-weight:900;
  color:white;
  background:rgba(15,23,42,.14);
  border:2px solid rgba(15,23,42,.08);
}
.light.good{
  background:linear-gradient(135deg,#16A34A,#22C55E);
  box-shadow:0 0 24px rgba(34,197,94,.60);
}
.light.blue{
  background:linear-gradient(135deg,#2563EB,#60A5FA);
  box-shadow:0 0 24px rgba(96,165,250,.65);
}
.light.bad{
  background:linear-gradient(135deg,#B91C1C,#EF4444);
  box-shadow:0 0 24px rgba(239,68,68,.65);
}
.comment{
  display:none;
  margin-top:10px;
  background:#F8FAFC;
  border:2px solid #BFDBFE;
  border-radius:18px;
  padding:12px;
  font-size:clamp(13px,.95vw,16px);
  line-height:1.25;
  font-weight:750;
  color:#0F172A;
  max-height:155px;
  overflow-y:auto;
}
.comment.show{display:block}
.footer{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  padding-top:10px;
  border-top:1px solid rgba(255,255,255,.22);
}
.btns{
  display:flex;
  gap:9px;
  flex-wrap:wrap;
}
.btn{
  border:0;
  border-radius:15px;
  padding:10px 15px;
  font-size:15px;
  font-weight:900;
  color:#0F172A;
  background:#fff;
  cursor:pointer;
  box-shadow:0 8px 18px rgba(0,0,0,.16);
}
.btn.primary{background:#FBBF24}
.footnote{
  color:#DBEAFE;
  font-weight:900;
  text-align:right;
  font-size:13px;
}
.question-grid{
  display:none;
  position:absolute;
  inset:78px 22px 76px;
  background:rgba(15,23,42,.97);
  border:2px solid rgba(255,255,255,.24);
  border-radius:24px;
  padding:16px;
  overflow:auto;
}
.question-grid.show{display:block}
.grid-title{
  font-size:23px;
  font-weight:900;
  margin-bottom:12px;
}
.grid{
  display:grid;
  grid-template-columns:repeat(10,1fr);
  gap:7px;
}
.grid button{
  border:0;
  border-radius:11px;
  padding:9px 0;
  font-weight:900;
  color:#fff;
  background:rgba(255,255,255,.16);
  cursor:pointer;
}
.grid button.current{background:#FBBF24;color:#111827}
.grid button.ok{background:#16A34A}
.grid button.no{background:#DC2626}
.final{
  display:none;
  text-align:center;
  padding:22px;
}
.final.show{
  display:flex;
  flex:1;
  min-height:0;
  align-items:center;
  justify-content:center;
  flex-direction:column;
}
.final h2{
  font-size:46px;
  margin-bottom:16px;
}
.final p{
  font-size:28px;
  font-weight:900;
  margin:6px 0;
}
@media(max-width:900px){
  body{display:block;padding:0;overflow:auto}
  .stage{width:100vw;min-height:100vh;max-height:none;aspect-ratio:auto;border:0;border-radius:0;padding:12px}
  .header{display:block}
  .course h1{text-align:center;font-size:18px}
  .course p{text-align:center;font-size:13px}
  .score{min-width:0;grid-template-columns:repeat(2,1fr);margin-top:10px}
  .content{grid-template-columns:1fr;gap:10px}
  .question-text{font-size:18px}
  .option{font-size:15px}
  .footer{display:block}
  .btns{justify-content:center}
  .footnote{text-align:center;margin-top:9px}
  .grid{grid-template-columns:repeat(5,1fr)}
}
</style>
</head>
<body>
<div class="stage">
  <div class="header">
    <div class="course">
      <h1>Curso de Contabilidade Professor Moreira</h1>
      <p>Quiz Premium CPC 00 – 100 primeiras questões FGV • Formato PowerPoint</p>
    </div>
    <div class="score">
      <div class="scorebox"><span>📚 Questão</span><strong id="qCounter">1/100</strong></div>
      <div class="scorebox"><span>✅ Acertos</span><strong id="rightCounter">0</strong></div>
      <div class="scorebox"><span>❌ Erros</span><strong id="wrongCounter">0</strong></div>
      <div class="scorebox"><span>⏰ Tempo</span><strong id="timer">00:00</strong></div>
    </div>
  </div>

  <div class="content" id="quizContent">
    <section class="card">
      <div class="meta">
        <span class="badge" id="banca"></span>
        <span class="badge" id="concurso"></span>
      </div>
      <div class="question-text" id="questionText"></div>
    </section>

    <section class="card">
      <div class="options" id="options"></div>
      <div class="light" id="light"></div>
      <div class="comment" id="comment"></div>
    </section>
  </div>

  <div class="final" id="finalScreen">
    <h2>🏆 Resultado Final</h2>
    <p id="finalRight"></p>
    <p id="finalWrong"></p>
    <p id="finalPercent"></p>
  </div>

  <div class="footer">
    <div class="btns">
      <button class="btn" onclick="prevQuestion()">⬅️ Anterior</button>
      <button class="btn primary" onclick="nextQuestion()">Próxima ➡️</button>
      <button class="btn" onclick="toggleGrid()">🔢 Questões</button>
      <button class="btn" onclick="restartQuiz()">🔄 Reiniciar</button>
    </div>
    <div class="footnote">
      Curso de Contabilidade Professor Moreira<br>
      WhatsApp (61) 98532-3574
    </div>
  </div>

  <div class="question-grid" id="gridPanel">
    <div class="grid-title">🔢 Navegar pelas questões</div>
    <div class="grid" id="grid"></div>
  </div>
</div>

eis a seus usuários primários na tomada de decisões referente à oferta de recursos à entidade."}, "gabarito": "E", "comentario": "A alternativa correta é a letra E: fornecer informações financeiras sobre a entidade que reporta que sejam úteis a seus usuários primários na tomada de decisões referente à oferta de recursos à entidade.. A questão cobra conceito do CPC 00. A resolução exige identificar a palavra-chave do enunciado e relacioná-la ao conceito técnico correto."}, {"numero": 3, "banca": "FGV", "concurso": "Ana Leg (ALERO)/ALERO/Contabilidade/2026", "enunciado": "De acordo com o Pronunciamento Técnico CPC 00 (R2)- Estrutura Conceitual para Relatório Financeiro, o objetivo do relatório financeiro para fins gerais é fornecer informações financeiras sobre a entidade que reporta que sejam úteis para os seus principais usuários na tomada de decisões referente à oferta de recursos à entidade. O público em geral também pode considerar relatórios financeiros para fins gerais úteis. No entanto, esses relatórios serão direcionados a eles quando são", "alternativas": {"a": "credores e reguladores.", "b": "investidores e credores.", "c": "empregados e administradores.", "d": "administradores e investidores.", "e": "reguladores e entidades governamentais."}, "gabarito": "B", "comentario": "A alternativa correta é a letra B: investidores e credores.. Pelo CPC 00, o objetivo do relatório financeiro para fins gerais é fornecer informações financeiras úteis sobre a entidade que reporta aos usuários primários, para decisões relacionadas à oferta de recursos à entidade."}, {"numero": 4, "banca": "FGV", "concurso": "Ass Leg (ALERO)/ALERO/Técnico em Contabilidade/2026", "enunciado": "De acordo com o Pronunciamento Técnico CPC 00 (R2)- Estrutura Conceitual para Relatório Financeiro, muitos investidores, credores por empréstimos e outros credores, existentes e potenciais, são os principais usuários aos quais se destinam relatórios financeiros para fins gerais. Isso significa que esses usuários", "alternativas": {"a": "têm as mesmas necessidades e desejos de informação.", "b": "representam a única fonte de financiamento da entidade.", "c": "podem exigir que a entidade que reporta forneça informações diretamente a eles.", "d": "devem se basear nestes relatórios para muitas das informações financeiras de que necessitam.", "e": "recebem informação sobre o montante que representa o valor da entidade por meio destes relatórios."}, "gabarito": "D", "comentario": "A alternativa correta é a letra D: devem se basear nestes relatórios para muitas das informações financeiras de que necessitam.. Os usuários primários são investidores, credores por empréstimos e outros credores, existentes e potenciais. A administração não é usuária primária, pois pode obter internamente as informações de que necessita."}, {"numero": 5, "banca": "FGV", "concurso": "Bach (CFC)/CFC/1º Exame de Suficiência/2025", "enunciado": "Um supermercado funciona na região sul do país. Em maio de 2024, devido às fortes chuvas, o supermercado perdeu todo o seu estoque. Nas demonstrações contábeis mensais, em 31/05/24, o supermercado optou por baixar todo o estoque, mesmo sem ter recebido um laudo oficial, de modo a tornar as demonstrações mais úteis aos tomadores de decisões. A informação apresenta a seguinte característica qualitativa:", "alternativas": {"a": "neutralidade.", "b": "materialidade.", "c": "verificabilidade.", "d": "tempestividade."}, "gabarito": "D", "comentario": "A alternativa correta é a letra D: tempestividade.. A questão cobra conceito do CPC 00. A resolução exige identificar a palavra-chave do enunciado e relacioná-la ao conceito técnico correto."}, {"numero": 6, "banca": "FGV", "concurso": "Bach (CFC)/CFC/1º Exame de Suficiência/2025", "enunciado": "De acordo com a NBC TG Estrutura Conceitual- ESTRUTURA CONCEITUAL PARA RELATÓRIO FINANCEIRO, as demonstrações contábeis consolidadas fornecem informações sobre os ativos, passivos, patrimônio líquido, receitas e despesas ch (CFC)/CFC/1º Exame de Suficiência/2025", "enunciado": "A NBC TG ESTRUTURA CONCEITUAL descreve uma série de conceitos utilizados para a elaboração de relatórios financeiros para fins gerais. Relacione cada elemento a seguir com sua correta definição segundo a Estrutura Conceitual. Elemento Definição a. Despesa b. Patrimônio Líquido c. Receita I. Aumentos nos ativos, ou reduções nos passivos, que resultam em aumento no patrimônio líquido. II. Reduções nos ativos, ou aumentos nos passivos, que resultam em reduções no patrimônio líquido. III. Participação residual nos ativos da entidade após a dedução de todos os seus passivos. Os elementos a, b e c correspondem, respectivamente, às definições", "alternativas": {"a": "II – III – I.", "b": "I – III – II.", "c": "II – I – III.", "d": "I – II – III."}, "gabarito": "A", "comentario": "A alternativa correta é a letra A: II – III – I.. Ativo é recurso econômico presente controlado pela entidade como resultado de eventos passados. O foco é o controle do recurso, não necessariamente a propriedade legal."}, {"numero": 10, "banca": "FGV", "concurso": "Ana CI (Pref Canaã Carajás)/Pref Canaã Carajás/2025", "enunciado": "De acordo com a premissa da continuidade operacional, presente na Estrutura Conceitual para Relatório Financeiro, presume-se que a entidade não tem a intenção e nem a necessidade de", "alternativas": {"a": "mudar a área ou o local de atuação.", "b": "entrar em liquidação ou deixar de negociar.", "c": "substituir as suas estratégias financeiras ou operacionais.", "d": "deixar de publicar seus relatórios contábeis ou econômicos.", "e": "continuar operando por tempo indeterminado ou desconhecido."}, "gabarito": "B", "comentario": "A alternativa correta é a letra B: entrar em liquidação ou deixar de negociar.. A premissa da continuidade operacional presume que a entidade continuará operando, sem intenção ou necessidade de entrar em liquidação ou deixar de negociar."}, {"numero": 11, "banca": "FGV", "concurso": "AJ TRT24/TRT 24/Administrativa/Contabilidade/2025", "enunciado": "De acordo com a NBC TG Estrutura Conceitual - Estrutura Conceitual para Relatório Financeiro, o objetivo do relatório financeiro para fins gerais é fornecer informações financeiras sobre a entidade que reporta que sejam úteis para os seus principais usuários na tomada de decisões. Entre estas decisões está", "alternativas": {"a": "reter ou distribuir o resultado obtido.", "b": "expandir ou retrair os negócios perante uma crise.", "c": "aumentar ou manter o preço de venda dos produtos e serviços.", "d": "adotar estratégias agressivas ou conservadoras na gestão do capital circulante.", "e": "comprar, vender ou manter instrumento de patrimônio e de dívida."}, "gabarito": "E", "comentario": "A alternativa correta é a letra E: comprar, vender ou manter instrumento de patrimônio e de dívida.. Pelo CPC 00, o objetivo do relatório financeiro para fins gerais é fornecer informações financeiras úteis sobre a entidade que reporta aos usuários primários, para decisões relacionadas à oferta de recursos à entidade."}, {"numero": 12, "banca": "FGV", "concurso": "AJ TRT24/TRT 24/Administrativa/Contabilidade/2025", "enunciado": "De acordo com a NBC TG Estrutura Conceitual - Estrutura Conceitual para Relatório Financeiro, um ativo, necessariamente,", "alternativas": {"a": "é um bem corpóreo.", "b": "está atrelado a eventos futuros previsíveis.", "c": "tem o potencial de produzir benefícios econômicos.", "d": "representa um direito presente perante os acionistas.", "e": "foi adquirido pela entidade em uma transação com terceiros."}, "gabarito": "C", "comentario": "A alternativa correta é a letra C: tem o potencial de produzir benefícios econômicos.. Ativo é recurso econômico presente controlado pela entidade como resultado de eventos passados. O foco é o controle do recurso, não necessariamente a propriedade legal."}, {"numero": 13, "banca": "FGV", "concurso": "ADP (DPE RO)/DPE RO/Contábil/2025", "enunciado": "De acordo com o Pronunciamento Técnico CPC 00 (R2)- Estrutura Conceitual para Relatório Financeiro, o custo é uma restrição generalizada sobre as informações que podem ser fornecidas pelo relatório financeiro. Em relação a essa restrição, avalie as afirmativas a seguir e assinale (V) para a verdadeira e (F) para a falsa. ( ) O relatório de informações financeiras impõe custos, e é importante que esses custos sejam justificados pelos benefícios de apresentar essas informações. ( ) Os fornecedores de informações financeiras gastam a maior parte dos esforços envolvidos na coleta, processamento, verificação e disseminação de informações financeiras, mas, em última instância, os usuários arcam com esses custos na forma de retornos reduzidos. ( ) Os usuários de informações financeiras podem incorrer em custos de análise e interpretação das informações fornecidas. Se as informações necessárias não são fornecidas, os usuários incorrem em custos de realizar a análise incompleta, sem as devidas informações. As afirmativas são, respectivamente,", "alternativas": {"a": "V – V – V.", "b": "V – V – F.", "c": "V – F – V.", "d": "F – V – V.", "e": "V – F – F."}, "gabarito": "B", "comentario": "A alternativa correta é a letra B: V – V – F.. Os usuários primários são investidores, credores por empréstimos e outros credores, existentes e potenciais. A administração não é usuária primária, pois pode obter internamente as informações de que necessita."}, {"numero": 14, "banca": "FGV", "concurso": "TDP (DPE RO)/DPE RO/Técnico em Contabilidade/2025", "enunciado": "Um médico é proprietário de uma clínica integrativa. Para avaliar como estão os seus negócios, ele estudou e adquiriu conhecimento relacionado às atividades comerciais, contábeis e econômicas e começou a revisar e analisar as informações de modo diligente. De acordo com a característica qualitativa da Compreensibilidade, conforme o Pronunciamento Técnico CPC 00 (R2)- Estrutura Conceitual para Relatório Financeiro, os relatórios financeiros da clínica", "alternativas": {"a": "são elaborados para o médico, uma vez que ele deve pagar impostos sobre o resultado obtido.", "b": "não são elaborados para o médico, uma vez que, como dono, ele pode conseguir as informações que deseja diretamente.", "c": "são elaborados para o médico, uma vez que ele é o proprietário da clínica e, como consequência, interessado em seus resultados.", "d": "são elaborados para o médico, uma vez que ele tem conhecimento das atividades comerciais e econômicas e revisa e analisa as informações de modo diligente.", "e": "não são elaborados para o médico, uma vez que há pessoas na clínica responsáveis pela administração contábil e financeira dos negócios."}, "gabarito": "D", "comentario": "A alternativa correta é a letra D: são elaborados para o médico, uma vez que ele tem conhecimento das atividades comerciais e econômicas e revisa e analisa as informações de modo diligente.. Compreensibilidade exige apresentação clara e concisa, considerando usuários com conhecimento razoável e que analisam as informações com diligência."}, {"numero": 15, "banca": "FGV", "concurso": "TDP (DPE RO)/DPE RO/Técnico em Contabilidade/2025", "enunciado": "Leia o fragmento a seguir. “Tempestividade significa disponibilizar informações aos __________ a tempo para que sejam capazes de __________ as suas decisões”. Assinale a alternativa cujos itens completam corretamente as lacunas do fragmento acima, de acordo com o Pronunciamento Técnico CPC 00 (R2) - Estrutura Conceitual para Relatório Financeiro:", "alternativas": {"a": "tomadores de decisões – modificar.", "b": "tomadores de decisões – influenciar.", "c": "administradores da entidade – modificar.", "d": "administradores da entidade – influenciar.", "e": "administradores da entidade – corroborar."}, "gabarito": "B", "comentario": "A alternativa correta é a letra B: tomadores de decisões – influenciar.. Tempestividade significa disponibilizar informações aos tomadores de decisão a tempo de influenciar suas decisões. Quando a informação chega tarde, sua utilidade diminui."}, {"numero": 16, "banca": "FGV", "concurso": "Ana GM (Pref SJC)/Pref SJC/Ciências Contábeis/2025", "enunciado": "Em junho de 2025, uma entidade do setor público reconheceu R$ 60.000,00 como despesas orçamentárias com auxílio-alimentação pagas por meio de cartão magnético. Do valor, R$ 48.000,00 foram destinados a servidores e R$ 12.000,00, a estagiários. Em relação ao elemento de despesa, deve ser contabilizado como “Auxílio-Alimentação” o seguinte valor:", "alternativas": {"a": "zero.", "b": "R$ 12.000,00.", "c": "R$ 36.000,00.", "d": "R$ 48.000,00.", "e": "R$ 60.000,00."}, "gabarito": "E", "comentario": "A alternativa correta é a letra E: R$ 60.000,00.. Receitas aumentam o patrimônio líquido por aumento de ativos ou redução de passivos, exceto contribuições dos sócios. Despesas reduzem o patrimônio líquido por redução de ativos ou aumento de passivos, exceto distribuições aos sócios."}, {"numero": 17, "banca": "FGV", "concurso": "Ana GM (Pref SJC)/Pref SJC/Ciências Contábeis/2025", "enunciado": "Ao analisar as informações contábeis produzidas e divulgadas por uma entidade do setor público, o funcionário responsável por apresentar um posicionamento técnico sobre o desempenho da entidade constatou que a informação não era tempestiva. Desse modo, a informação poderia ter menos", "alternativas": {"a": "utilidade.", "b": "materialidade.", "c": "verificabilidade.", "d": "comparabilidade.", "e": "compreensibilidade."}, "gabarito": "A", "comentario": "A alternativa correta é a letra A: utilidade.. A questão cobra conceito do CPC 00. A resolução exige identificar a palavra-chave do enunciado e relacioná-la ao conceito técnico correto."}, {"numero": 18, "banca": "FGV", "concurso": "Bach (CFC)/CFC/2º Exame de Suficiência/2025", "enunciado": "De acordo com a NBC TG ESTRUTURA CONCEITUAL - ESTRUTURA CONCEITUAL PARA RELATÓRIO FINANCEIRO, as características qualitativas fundamentais são relevância e representação fidedigna, sendo que, para ser representação fidedigna, a representação deve ser completa, neutra e isenta de erros. Uma informação neutra pode", "alternativas": {"a": "ser parcial.", "b": "ser prudente.", "c": "possuir inclinações.", "d": "ser tendenciosa na seleção de informações financeiras."}, "gabarito": "B", "comentario": "A alternativa correta é a letra B: ser prudente.. A representação fidedigna exige informação completa, neutra e isenta de erros. Informação falsa, incompleta ou enviesada não representa fielmente o fenômeno econômico."}, {"numero": 19, "banca": "FGV", "concurso": "Bach (CFC)/CFC/2º Exame de Suficiência/2025", "enunciado": "De acordo com a NBC TG ESTRUTURA CONCEITUAL - ESTRUTURA CONCEITUAL PARA RELATÓRIO FINANCEIRO, para ajudar os usuários das demonstrações contábeis a identificar e avaliar mudanças e tendências, as demonstrações contábeis", "alternativas": {"a": "são elaboradas com base na forma jurídica, em detrimento da essência das transações.", "b": "restringem a utilização de estimativas a casos em que poderá haver perdas financeiras do usuário.", "c": "incluem, apenas, informações que podem ser compreendidas, também, por usuários com pouco conhecimento das atividades comerciais e econômicas, sem auxílio de consultores.", "d": "fornecem informações comparativas de, pelo menos, um período de relatório anterior."}, "gabarito": "D", "comentario": "A alternativa correta é a letra D: fornecem informações comparativas de, pelo menos, um período de relatório anterior.. Os usuários primários são investidores, credores por empréstimos e outros credores, existentes e potenciais. A administração não é usuária primária, pois pode obter internamente as informações de que necessita."}, {"numero": 20, "banca": "FGV", "concurso": "Bach (CFC)/CFC/2º Exame de Suficiência/2025", "enunciado": "De acordo com a NBC TG ESTRUTURA CONCEITUAL - ESTRUTURA CONCEITUAL PARA RELATÓRIO FINANCEIRO, com relação às implicações das características qualitativas para a escolha da base de mensuração, avalie as afirmativas a seguir e assinale (V) para a verdadeira e (F) para a falsa. ( ) Utilizar consistentemente as mesmas bases de mensuração para os mesmos itens, seja de período a período, na entidade que reporta ou em um único período para diferentes entidades, prejudica a comparabilidade das demonstrações. ( ) A mudança na base de mensuração pode tornar as demonstrações contábeis menos compreensíveis. Contudo, a mudança pode ser justificada se outros fatores compensarem a redução na compreensibilidade, por exemplo, se a mudança resulta em informações mais relevantes. ( ) A verificação é melhorada utilizando-se bases de mensuração que resultam em avaliações que podem ser independentemente corroboradas diretamente, por exemplo, observando os preços, ou indiretamente, por exemplo, verificando dados de entrada de modelo. As afirmativas são, respectivamente,", "alternativas": {"a": "V – V – V.", "b": "V – V – F.", "c": "V – F – V.", "d": "F – V – V."}, "gabarito": "D", "comentario": "A alternativa correta é a letra D: F – V – V.. Comparabilidade permite identificar semelhanças e diferenças entre itens, períodos ou entidades. A consistência no uso dos métodos ajuda a alcançar comparabilidade."}, {"numero": 21, "banca": "FGV", "concurso": "Bach (CFC)/CFC/2º Exame de Suficiência/2025", "enunciado": "A NBC TG ESTRUTURA CONCEITUAL estabelece os conceitos dos elementos das demonstrações contábeis. Com base nessa norma, avalie as afirmativas a seguir e assinale (V) para a verdadeira e (F) para a falsa. ( ) Ativo é um recurso econômico presente de propriedade da entidade como resultado de eventos passados. ( ) Passivo é uma obrigação futura da entidade de transferir um recurso econômico como resultado de eventos passados. ( ) Receitas são aumentos nos ativos, ou reduções nos passivos, que resultam em aumento no patrimônio líquido, exceto aqueles referentes a contribuições de detentores de direitos sobre o patrimônio. ( ) Despesas são reduções nos ativos, ou aumentos nos passivos, que resultam em reduções no patrimônio líquido, exceto aqueles referentes a distribuições aos detentores de direitos sobre o patrimônio. As afirmativas são, respectivamente,", "alternativas": {"a": "F – F – V – V.", "b": "F – V – F – V.", "c": "V – F – V – F.", "d": "V – V – F – F."}, "gabarito": "A", "comentario": "A alternativa correta é a letra A: F – F – V – V.. Ativo é recurso econômico presente controlado pela entidade como resultado de eventos passados. O foco é o controle do recurso, não necessariamente a propriedade legal."}, {"numero": 22, "banca": "FGV", "concurso": "Ana Gest (AgSUS)/AgSUS/Contabilidade/2025", "enunciado": "A direção de uma sociedade empresária decidiu divulgar, ao público, as vendas realizadas em tempo real, de modo a tentar uma conexão com os seus usuários, o que gerou gastos adicionais com pessoal e sistemas. Após um ano, foi realizada uma pesquisa e verificou-se que os usuários não deram valor a essa informação, após a implantação da divulgação. Além disso, não foi possível verificar outro tipo de retorno relacionado à ação. Considerando o conteúdo do Pronunciamento Técnico CPC 00 (R2)- Estrutura Conceitual para Relatório Financeiro, pode-se concluir que", "alternativas": {"a": "a divulgação foi incompleta.", "b": "a ação perdeu a tempestividade.", "c": "a continuidade operacional não foi seguida.", "d": "os custos foram maiores do que os benefícios.", "e": "os resultados não seguiram à verificabilidade."}, "gabarito": "D", "comentario": "A alternativa correta é a letra D: os custos foram maiores do que os benefícios.. Os usuários primários são investidores, credores por empréstimos e outros credores, existentes e potenciais. A administração não é usuária primária, pois pode obter internamente as informações de que necessita."}, {"numero": 23, "banca": "FGV", "concurso": "Cont (Nittrans)/Nittrans/2025", "enunciado": "Uma sociedade empresária pretende encerrar as suas atividades e entrar em liquidação no início do exercício seguinte. Desse modo, elaborou as suas demonstrações contábeis com base na suposição de continuidade operacional. Considerando a situação da empresa e o Pronunciamento Técnico CPC 00 (R2)- Estrutura Conceitual para Relatório Financeiro, o posicionamento da sociedade empresária, ao elaborar as suas demonstrações, está", "alternativas": {"a": "correto, uma vez que está sendo respeitado o princípio da entidade contábil.", "b": "correto, desde que os custos sejam menores do que os benefícios.", "c": "incorreto, uma vez que se deve adotar a essência sobre a forma.", "d": "correto, uma vez que as demonstrações contábeis devem ser elaboradas de acordo com o Regime de Caixa.", "e": "incorreto, uma vez que as demonstrações contábeis podem ter que ser elaboradas em base diferente."}, "gabarito": "E", "comentario": "A alternativa correta é a letra E: incorreto, uma vez que as demonstrações contábeis podem ter que ser elaboradas em base diferente.. A premissa da continuidade operacional presume que a entidade continuará operando, sem intenção ou necessidade de entrar em liquidação ou deixar de negociar."}, {"numero": 24, "banca": "FGV", "concurso": "Tec (Nittrans)/Nittrans/Contábil/2025", "enunciado": "Um ativo é um recurso controlado no presente pela entidade como resultado de evento passado. Para avaliar se a entidade controla o recurso no presente, deve ser observada a existência dos seguintes indicadores de controle, a exceção de um. Assinale-o:", "alternativas": {"a": "Posse física legal.", "b": "Direito legítimo ao potencial de serviços.", "c": "Acesso ao recurso ou capacidade de negar ou restringir o acesso a esses.", "d": "Meios que assegurem que o recurso seja utilizado para alcançar os seus objetivos.", "e": "Direito legítimo à capacidade para gerar os benefícios econômicos advindos do recurso."}, "gabarito": "A", "comentario": "A alternativa correta é a letra A: Posse física legal.. Ativo é recurso econômico presente controlado pela entidade como resultado de eventos passados. O foco é o controle do recurso, não necessariamente a propriedade legal."}, {"numero": 25, "banca": "FGV", "concurso": "Tec (Nittrans)/Nittrans/Contábil/2025", "enunciado": "De acordo com a característica qualitativa da verificabilidade, a verificação pode ocorrer de forma direta ou indireta. Assinale a opção que apresenta um exemplo de verificação indireta", "alternativas": {"a": "Contagem de caixa.", "b": "Realização de inventário dos ativos imobilizados em uso.", "c": "Observação de títulos negociáveis e suas cotações de preço.", "d": "Confirmação de que os fatores identificados que influenciaram o desempenho passado estão presentes e relacionados com os efeitos identificados.", "e": "Verificação do valor contábil do estoque por meio da conferência das entradas e do recálculo do estoque final utilizando o mesmo método de mensuração."}, "gabarito": "E", "comentario": "A alternativa correta é a letra E: Verificação do valor contábil do estoque por meio da conferência das entradas e do recálculo do estoque final utilizando o mesmo método de mensuração.. Verificabilidade ajuda a assegurar que a informação representa fidedignamente o fenômeno econômico. Pode ser direta, por observação, ou indireta, por conferência e recálculo."}, {"numero": 26, "banca": "FGV", "concurso": "Ana Geo (CPRM)/CPRM/Contabilidade/2025", "enunciado": "Em relação à aplicação das características qualitativas de informações financeiras úteis, é correto afirmar que, em determinas circunstâncias, pode ser útil uma informação que é", "alternativas": {"a": "tempestiva, mas não neutra.", "b": "verificável, mas não completa.", "c": "relevante, mas não comparável.", "d": "material, mas não representação fidedigna.", "e": "compreensível, mas não isenta de erros materiais."}, "gabarito": "C", "comentario": "A alternativa correta é a letra C: relevante, mas não comparável.. A questão cobra conceito do CPC 00. A resolução exige identificar a palavra-chave do enunciado e relacioná-la ao conceito técnico correto."}, {"numero": 27, "banca": "FGV", "concurso": "ANL (CM Fortal)/CM Fortaleza/Contador/2024", "enunciado": "Após o período contábil, e antes da aprovação a que se referem as demonstrações contábeis, a administração de uma entidade determina que pretende liquidá-la. Nesse caso, a entidade deve elaborar as demonstrações contábeis do período finalizado", "alternativas": {"a": "de modo resumido.", "b": "sem utilizar o pressuposto de continuidade.", "c": "em duas versões, seguindo e não seguindo o pressuposto de continuidade.", "d": "de acordo com o pressuposto de continuidade, com ajustes nas principais contas.", "e": "de acordo com o pressuposto de continuidade e divulgação do fato em notas explicativas."}, "gabarito": "B", "comentario": "A alternativa correta é a letra B: sem utilizar o pressuposto de continuidade.. Os usuários primários são investidores, credores por empréstimos e outros credores, existentes e potenciais. A administração não é usuária primária, pois pode obter internamente as informações de que necessita."}, {"numero": 28, "banca": "FGV", "concurso": "Tec Leg (ALEP)/ALEP/Técnico em Contabilidade/2024", "enunciado": "De acordo com a NBC TG Estrutura Conceitual- Estrutura Conceitual para Relatório Financeiro, o patrimônio líquido de uma entidade representa a participação residual", "alternativas": {"a": "nos ativos após a dedução de todos os seus passivos.", "b": "nos ativos após a dedução de todas as suas despesas.", "c": "nas receitas após a dedução de todos os seus ativos.", "d": "nos passivos após a dedução de todas as suas despesas.", "e": "nas receitas após a dedução de todas as suas despesas."}, "gabarito": "A", "comentario": "A alternativa correta é a letra A: nos ativos após a dedução de todos os seus passivos.. Patrimônio líquido é a participação residual nos ativos da entidade após a dedução de todos os seus passivos."}, {"numero": 29, "banca": "FGV", "concurso": "Tec NS (TJ MS)/TJ MS/Analista Técnico-Contábil/2024", "enunciado": "O entendimento efetivo de conceitos a partir das normas e dos pronunciamentos contábeis é imprescindível para que as informações sejam relevantes e representem fidedignamente o reconhecimento e a mensuração de ativos, passivos, patrimônio líquido, receitas e despesas da entidade. Em se tratando dos preceitos das normas e dos pronunciamentos contábeis, é correto afirmar que:", "alternativas": {"a": "a neutralidade é inconsistente com o exercício da prudência;", "b": "representação fidedigna significa representação precisa em todos os aspectos;", "c": "determinados pronunciamentos podem conter requisitos assimétricos, como, por exemplo, provisões e ativos contingentes;", "d": "prudência significa que ativos e receitas devem ser superavaliados e passivos e despesas devem ser subavaliados;", "e": "informações neutras significam informações sem nenhum propósito ou sem nenhuma influência sobre o comportamento."}, "gabarito": "C", "comentario": "A alternativa correta é a letra C: determinados pronunciamentos podem conter requisitos assimétricos, como, por exemplo, provisões e ativos contingentes;. A representação fidedigna exige informação completa, neutra e isenta de erros. Informação falsa, incompleta ou enviesada não representa fielmente o fenômeno econômico."}, {"numero": 30, "banca": "FGV", "concurso": "Cont (Pref Caraguatatuba)/Pref Caraguatatuba/2024", "enunciado": "O custo é uma restrição generalizada sobre as informações que podem ser fornecidas pelo relatório financeiro. De acordo com a NBC TG Estrutura Conceitual - Estrutura Conceitual para Relatório Financeiro, o relatório de informações financeiras impõe custos, e é importante que esses custos sejam justificados pelo(s)", "alternativas": {"a": "resultados financeiros deste período.", "b": "resultados operacionais deste período.", "c": "número de horas trabalhadas para elabora-lo.", "d": "número de profissionais envolvidos no processo.", "e": "benefícios de apresentar essas informações."}, "gabarito": "E", "comentario": "A alternativa correta é a letra E: benefícios de apresentar essas informações.. O custo é uma restrição generalizada sobre a informação financeira. Os benefícios de fornecer a informação devem justificar os custos de preparação, divulgação, verificação e análise."}, {"numero": 31, "banca": "FGV", "concurso": "Cont (Pref Caraguatatuba)/Pref Caraguatatuba/2024", "enunciado": "De acordo com a NBC TG 23 (R2) – Políticas Contábeis, Mudança de Estimativa e Retificação de Erro, a menos que for exigida ou resultar em informação mais relevante, as mesmas políticas contábeis devem ser aplicadas em cada período e de um período para o outro. Isso acontece para possibilitar a seguinte característica qualitativa da informação financeira útil em relação às demonstrações contábeis.", "alternativas": {"a": "Relevância.", "b": "Oportunidade.", "c": "Tempestividade.", "d": "Comparabilidade.", "e": "Compreensibilidade."}, "gabarito": "D", "comentario": "A alternativa correta é a letra D: Comparabilidade.. A questão cobra conceito do CPC 00. A resolução exige identificar a palavra-chave do enunciado e relacioná-la ao conceito técnico correto."}, {"numero": 32, "banca": "FGV", "concurso": "CInt (Pref Caraguatatuba)/Pref Caraguatatuba/2024", "enunciado": "Em relação à estrutura conceitual para Relatório Financeiro da contabilidade e às suas implicações, pode-se afirmar que, nas demonstrações contábeis, as informações financeiras úteis devem", "alternativas": {"a": "ser corrigidas pela inflação.", "b": "utilizar sempre os mesmos padrões.", "c": "ser produzidas e apresentadas sem custos.", "d": "ser disponibilizadas aos usuários no momento em que os eventos econômicos ocorrem.", "e": "representar de forma fidedigna a essência dos fenômenos que pretendem representar."}, "gabarito": "E", "comentario": "A alternativa correta é a letra E: representar de forma fidedigna a essência dos fenômenos que pretendem representar.. A questão cobra conceito do CPC 00. A resolução exige identificar a palavra-chave do enunciado e relacioná-la ao conceito técnico correto."}, {"numero": 33, "banca": "FGV", "concurso": "Tec (Pref Caraguatatuba)/Pref Caraguatatuba/Contabilidade/2024", "enunciado": "De acordo com o Pronunciamento Técnico CPC 00 (R2) Estrutura Conceitual para Relatório Financeiro, os investidores, credores por empréstimos e outros credores, existentes e potenciais, são os principais usuários aos quais se destinam relatórios financeiros para fins gerais. Isso acontece porque muitos deles", "alternativas": {"a": "recebem a maior parte do resultado gerado pela entidade que reporta.", "b": "representam os principais financiadores das entidades que reportam.", "c": "assumem os maiores riscos operacionais ao se relacionarem com a entidade que reporta.", "d": "contratam e remuneram a empresa de auditoria independente responsável pelos relatórios.", "e": "não podem exigir que as entidades que reportam forneçam informações diretamente a eles."}, "gabarito": "E", "comentario": "A alternativa correta é a letra E: não podem exigir que as entidades que reportam forneçam informações diretamente a eles.. Os usuários primários são investidores, credores por empréstimos e outros credores, existentes e potenciais. A administração não é usuária primária, pois pode obter internamente as informações de que necessita."}, {"numero": 34, "banca": "FGV", "concurso": "ACE (TCE-GO)/TCE GO/Ciências Contábeis/2024", "enunciado": "De acordo com o Pronunciamento Técnico CPC 00 (R2)- Estrutura Conceitual para Relatório Financeiro, a Estrutura Conceitual estabelece a base para pronunciamentos que contribuem para a eficiência econômica, ajudando os investidores a", "alternativas": {"a": "conhecer talentos globalmente, aprimorando a qualidade de mão de obra.", "b": "identificar oportunidades e riscos em todo o mundo, melhorando a alocação de capital.", "c": "aumentar o conhecimento em relação a seus investimentos, diminuindo o risco de oportunidade.", "d": "receber informações e relatórios com maior velocidade, aumentando a agilidade em suas escolhas.", "e": "melhorar a comunicação com as suas investidas, desenvolvendo um relacionamento mais vantajoso."}, "gabarito": "B", "comentario": "A alternativa correta é a letra B: identificar oportunidades e riscos em todo o mundo, melhorando a alocação de capital.. Os usuários primários são investidores, credores por empréstimos e outros credores, existentes e potenciais. A administração não é usuária primária, pois pode obter internamente as informações de que necessita."}, {"numero": 35, "banca": "FGV", "concurso": "Prof NS (SES MT)/SES MT/Contador/2024", "enunciado": "A Estrutura Conceitual para Relatório Financeiro, de acordo com o CPC 00 (R2) - Estrutura Conceitual para Relatório Financeiro, estabelece a base para pronunciamentos que contribuem para a eficiência econômica. Para os negócios, há redução no custo do capital, por conta", "alternativas": {"a": "da quebra de barreiras entre os países.", "b": "da adoção de normas de auditoria mais rigorosas.", "c": "do uso de linguagem de contabilidade única e confiável.", "d": "do estímulo do intercâmbio entre profissionais da contabilidade."}, "gabarito": "C", "comentario": "A alternativa correta é a letra C: do uso de linguagem de contabilidade única e confiável.. Na manutenção do capital financeiro, o lucro só existe se os ativos líquidos finais excederem os ativos líquidos iniciais, excluídas contribuições e distribuições aos sócios."}, {"numero": 36, "banca": "FGV", "concurso": "Prof NS (SES MT)/SES MT/Contador/2024", "enunciado": "De acordo com o CPC 00 (R2) – Estrutura Conceitual para Relatório Financeiro, as demonstrações contábeis fornecem informações sobre transações e outros eventos observados do ponto de vista dos(a)", "alternativas": {"a": "acionistas minoritários.", "b": "entidade que reporta como um todo.", "c": "usuários, em geral.", "d": "investidores e credores por empréstimos, existentes ou potenciais."}, "gabarito": "B", "comentario": "A alternativa correta é a letra B: entidade que reporta como um todo.. A questão cobra conceito do CPC 00. A resolução exige identificar a palavra-chave do enunciado e relacioná-la ao conceito técnico correto."}, {"numero": 37, "banca": "FGV", "concurso": "Aud CE (TCE-PA)/TCE PA/Fiscalização/Contabilidade/2024", "enunciado": "Uma entidade do setor público elabora anualmente informações sobre a sua situação patrimonial e o seu desempenho. Em 2023, ela elaborou as informações de maneira diferenciada, de modo que não foi possível aos usuários identificar semelhanças e diferenças entre as informações de 2023 e de 2022 e nem tomar decisões com base nelas. Assinale a opção que indica a característica qualitativa que não foi diretamente atendida no período:", "alternativas": {"a": "Materialidade.", "b": "Tempestividade.", "c": "Verificabilidade.", "d": "Comparabilidade.", "e": "Compreensibilidade."}, "gabarito": "D", "comentario": "A alternativa correta é a letra D: Comparabilidade.. Os usuários primários são investidores, credores por empréstimos e outros credores, existentes e potenciais. A administração não é usuária primária, pois pode obter internamente as informações de que necessita."}, {"numero": 38, "banca": "FGV", "concurso": "Aud CE (TCE-PA)/TCE PA/Administrativa/Contabilidade/2024", "enunciado": "De acordo com a característica qualitativa da relevância, as informações financeiras e não financeiras são relevantes caso sejam capazes de influenciar significativamente o cumprimento dos objetivos da elaboração e da divulgação da informação contábil. Para que a informação exerça essa influência, deve", "alternativas": {"a": "ser inédita aos usuários.", "b": "ser apresentada de maneira clara e sucinta.", "c": "ter valor confirmatório, preditivo ou ambos.", "d": "estar disponível no momento em que acontece.", "e": "ser considerada pelos usuários na tomada de decisão."}, "gabarito": "C", "comentario": "A alternativa correta é a letra C: ter valor confirmatório, preditivo ou ambos.. A informação é relevante quando é capaz de fazer diferença nas decisões dos usuários, possuindo valor preditivo, valor confirmatório ou ambos. A materialidade é aspecto da relevância."}, {"numero": 39, "banca": "FGV", "concurso": "Bach (CFC)/CFC/1º Exame de Suficiência/2024", "enunciado": "Desreconhecimento é a retirada de parte ou da totalidade de ativo ou passivo reconhecido do balanço patrimonial da entidade. O desreconhecimento normalmente ocorre quando esse item não atende mais à definição de ativo ou passivo, que expirou, foi consumido, recebido, executado ou transferido. A máquina utilizada para a produção do principal produto de uma determinada entidade deve ser desreconhecida quando", "alternativas": {"a": "perder todo o potencial de produzir benefícios econômicos para a entidade.", "b": "estiver parcialmente depreciado.", "c": "sofrer perda de valor recuperável.", "d": "estiver sob controle da entidade."}, "gabarito": "A", "comentario": "A alternativa correta é a letra A: perder todo o potencial de produzir benefícios econômicos para a entidade.. Ativo é recurso econômico presente controlado pela entidade como resultado de eventos passados. O foco é o controle do recurso, não necessariamente a propriedade legal."}, {"numero": 40, "banca": "FGV", "concurso": "Bach (CFC)/CFC/1º Exame de Suficiência/2024", "enunciado": "Conforme a NBC TG – ESTRUTURA CONCEITUAL, uma Receita reflete aumento nos ativos, ou redução nos passivos, que resultam em aumentos no patrimônio líquido, exceto aqueles referentes a contribuições de detentores de direitos sobre o patrimônio. Avalie se são reconhecidos como Receita, nesse contexto, os seguintes itens: I. Ganho de aplicação financeira. II. Transferência de estoques a clientes. III. Ganho na venda de imobilizado. IV. Entrada de recursos pela emissão/venda de debêntures. V. Entrada de recursos pela integralização do capital social. VI. Ganho na venda de ações em tesouraria. São considerados receitas os itens", "alternativas": {"a": "IV, V e VI.", "b": "II, III e VI.", "c": "I, III e IV.", "d": "I, II e III."}, "gabarito": "D", "comentario": "A alternativa correta é a letra D: I, II e III.. Ativo é recurso econômico presente controlado pela entidade como resultado de eventos passados. O foco é o controle do recurso, não necessariamente a propriedade legal."}, {"numero": 41, "banca": "FGV", "concurso": "Bach (CFC)/CFC/1º Exame de Suficiência/2024", "enunciado": "O conceito de Capital é adotado pela maioria das entidades na elaboração das Demonstrações Contábeis. A seleção do conceito apropriado de Capital pela entidade deve ser baseada nas necessidades dos seus usuários, principalmente, os preocupados com a manutenção de capital nominal investido ou com o poder de compra do capital investido. A manutenção do Capital em que o lucro é auferido somente se o montante dos ativos líquidos no final do período exceder o montante dos ativos líquidos no início do período, após excluir quaisquer distribuições para, e contribuições de, sócios durante o período, é a Manutenção do", "alternativas": {"a": "Capital Físico.", "b": "Capital Financeiro.", "c": "Capital Social.", "d": "Capital Integralizado."}, "gabarito": "B", "comentario": "A alternativa correta é a letra B: Capital Financeiro.. Os usuários primários são investidores, credores por empréstimos e outros credores, existentes e potenciais. A administração não é usuária primária, pois pode obter internamente as informações de que necessita."}, {"numero": 42, "banca": "FGV", "concurso": "Bach (CFC)/CFC/1º Exame de Suficiência/2024", "enunciado": "As demonstrações contábeis são normalmente elaboradas com base na suposição de que a entidade que reporta está em continuidade operacional. Desse modo, presume-se que a entidade não tem a intenção e nem a necessidade de", "alternativas": {"a": "tornar-se internacional.", "b": "modificar a sua atividade-fim.", "c": "entrar em liquidação ou deixar de negociar.", "d": "expandir os seus negócios para outras localidades."}, "gabarito": "C", "comentario": "A alternativa correta é a letra C: entrar em liquidação ou deixar de negociar.. A premissa da continuidade operacional presume que a entidade continuará operando, sem intenção ou necessidade de entrar em liquidação ou deixar de negociar."}, {"numero": 43, "banca": "FGV", "concurso": "Bach (CFC)/CFC/1º Exame de Suficiência/2024", "enunciado": "Uma entidade deseja reconhecer um ativo em seu balanço patrimonial. A sua mensuração envolve estimativas que estão sujeitas a incertezas. Nesse caso, a entidade", "alternativas": {"a": "não deve reconhecer nem divulgar o ativo, uma vez que não há objetividade em sua mensuração.", "b": "deve reconhecer o ativo sem mencionar a existência de estimativas, uma vez que estas foram elaboradas com zelo e são, portanto, confiáveis.", "c": "não deve reconhecer o ativo, mas evidenciá-lo em notas explicativas, uma vez que não há espaço para incertezas nas demonstrações contábeis elaboradas.", "d": "deve reconhecer o ativo e descrever e explicar as estimativas de forma clara e precisa, uma vez que o uso de estimativas razoáveis é parte essencial da elaboração de informações financeiras."}, "gabarito": "D", "comentario": "A alternativa correta é a letra D: deve reconhecer o ativo e descrever e explicar as estimativas de forma clara e precisa, uma vez que o uso de estimativas razoáveis é parte essencial da elaboração de informações financeiras.. Ativo é recurso econômico presente controlado pela entidade como resultado de eventos passados. O foco é o controle do recurso, não necessariamente a propriedade legal."}, {"numero": 44, "banca": "FGV", "concurso": "Bach (CFC)/CFC/1º Exame de Suficiência/2024", "enunciado": "Em 2023, uma entidade desreconheceu um ativo de seu balanço patrimonial. Assinale a opção que indica uma possível causa para o desreconhecimento.", "alternativas": {"a": "A entidade decidiu utilizar um terreno para finalidade diferente.", "b": "A entidade perdeu o controle de um imóvel, por meio de decisão judicial.", "c": "A entidade renegociou o prazo de recebimento de seus clientes, que estavam em situação financeira difícil.", "d": "A entidade constatou que as suas máquinas poderiam ser utilizadas por tempo maior do que a vida útil prevista."}, "gabarito": "B", "comentario": "A alternativa correta é a letra B: A entidade perdeu o controle de um imóvel, por meio de decisão judicial.. Ativo é recurso econômico presente controlado pela entidade como resultado de eventos passados. O foco é o controle do recurso, não necessariamente a propriedade legal."}, {"numero": 45, "banca": "FGV", "concurso": "Bach (CFC)/CFC/1º Exame de Suficiência/2024", "enunciado": "De acordo com o conceito de manutenção de capital financeiro, o lucro é auferido somente se o montante financeiro (ou dinheiro) dos ativos líquidos no final do período exceder o montante financeiro (ou dinheiro) dos ativos líquidos no início do período, após excluir", "alternativas": {"a": "compra e venda de ativos fixos durante o período.", "b": "distribuições para, e contribuições de, sócios durante o período.", "c": "reconhecimento contábil de receitas e de despesas durante o período.", "d": "recebimento de receitas e pagamentos de despesas durante o período."}, "gabarito": "B", "comentario": "A alternativa correta é a letra B: distribuições para, e contribuições de, sócios durante o período.. Ativo é recurso econômico presente controlado pela entidade como resultado de eventos passados. O foco é o controle do recurso, não necessariamente a propriedade legal."}, {"numero": 46, "banca": "FGV", "concurso": "Bach (CFC)/CFC/1º Exame de Suficiência/2024", "enunciado": "De acordo com a NBC TG Estrutura Conceitual - Estrutura Conceitual para Relatório Financeiro, os principais usuários aos quais se destinam os relatórios financeiros para fins gerais são representados por", "alternativas": {"a": "empregados, clientes e fornecedores.", "b": "detentores de participação societária e interessados em adquiri-la.", "c": "população em geral, impactada direta e indiretamente pelos relatórios.", "d": "investidores, credores por empréstimos e outros credores, existentes e potenciais."}, "gabarito": "D", "comentario": "A alternativa correta é a letra D: investidores, credores por empréstimos e outros credores, existentes e potenciais.. Os usuários primários são investidores, credores por empréstimos e outros credores, existentes e potenciais. A administração não é usuária primária, pois pode obter internamente as informações de que necessita."}, {"numero": 47, "banca": "FGV", "concurso": "AGC (EPE)/EPE/Contabilidade/2024", "enunciado": "De acordo com o Pronunciamento Técnico CPC 00 (R2), a Estrutura Conceitual para Relatório Financeiro contribui para a missão de desenvolver pronunciamentos que tragam aos mercados financeiros", "alternativas": {"a": "arrojamento, eficiência e comparabilidade.", "b": "transparência, comparabilidade e exatidão.", "c": "exatidão, redução de custos e conhecimento.", "d": "prestação de contas, economia e arrojamento.", "e": "transparência, prestação de contas e eficiência."}, "gabarito": "E", "comentario": "A alternativa correta é a letra E: transparência, prestação de contas e eficiência.. A questão cobra conceito do CPC 00. A resolução exige identificar a palavra-chave do enunciado e relacioná-la ao conceito técnico correto."}, {"numero": 48, "banca": "FGV", "concurso": "ATTM (Pref Nova Iguaçu)/Pref Nova Iguaçu/2024", "enunciado": "Os investidores, credores por empréstimos e outros credores existentes e potenciais são considerados os usuários principais, aos quais se destinam relatórios financeiros para fins gerais. De acordo com a NBC TG Estrutura Conceitual - Estrutura Conceitual para Relatório Financeiro, a administração da entidade não é considerada usuário principal, uma vez que", "alternativas": {"a": "tem como foco os relatórios gerenciais.", "b": "apresenta, em geral, alta rotatividade.", "c": "reporta-se diretamente aos diretores da entidade.", "d": "pode obter internamente as informações financeiras de que precisa.", "e": "não representa uma provedora de recursos essenciais para a sobrevivência da entidade."}, "gabarito": "D", "comentario": "A alternativa correta é a letra D: pode obter internamente as informações financeiras de que precisa.. Os usuários primários são investidores, credores por empréstimos e outros credores, existentes e potenciais. A administração não é usuária primária, pois pode obter internamente as informações de que necessita."}, {"numero": 49, "banca": "FGV", "concurso": "Ana Prev (MACAEPREV)/MACAEPREV/Contabilidade/2024", "enunciado": "De acordo com a NBC TG Estrutura Conceitual- Estrutura Conceitual para Relatório Financeiro, a Estrutura Conceitual estabelece a base para normas que reforçam a prestação de contas, reduzindo a lacuna de informações entre", "alternativas": {"a": "o Governo e os órgãos reguladores.", "b": "os órgãos reguladores e os elaboradores das demonstrações contábeis.", "c": "os provedores de capital e as pessoas a quem confiaram o seu dinheiro.", "d": "as entidades que elaboram o relatório financeiro e a auditoria externa.", "e": "a auditoria externa e o público a que se destina o relatório financeiro."}, "gabarito": "C", "comentario": "A alternativa correta é a letra C: os provedores de capital e as pessoas a quem confiaram o seu dinheiro.. A questão cobra conceito do CPC 00. A resolução exige identificar a palavra-chave do enunciado e relacioná-la ao conceito técnico correto."}, {"numero": 50, "banca": "FGV", "concurso": "Ana Prev (MACAEPREV)/MACAEPREV/Contabilidade/2024", "enunciado": "Em relação à conceituação dos elementos patrimoniais, assinale V para a afirmativa verdadeira e F para a falsa, de acordo com a Estrutura Conceitual: ( ) Ativo é o recurso econômico presente controlado pela entidade como resultado de eventos passados. ( ) Passivo é a obrigação presente da entidade de transferir um recurso econômico como resultado de eventos passados. ( ) Patrimônio Líquido é a participação residual nas receitas da entidade após a dedução de todas as suas despesas. As afirmativas são, respectivamente,", "alternativas": {"a": "V – V – F.", "b": "F – V – F.", "c": "V – F – F.", "d": "F – F – V.", "e": "V – V – V."}, "gabarito": "A", "comentario": "A alternativa correta é a letra A: V – V – F.. Ativo é recurso econômico presente controlado pela entidade como resultado de eventos passados. O foco é o controle do recurso, não necessariamente a propriedade legal."}, {"numero": 51, "banca": "FGV", "concurso": "Cont (Pref Macaé)/Pref Macaé/2024", "enunciado": "Uma livraria vendia livros de contabilidade e de direito. Os livros de contabilidade eram vendidos por R$200 e os de direito por R$160. Em setembro de 2024, a livraria fez uma ação promocional, de modo que quando um cliente adquirisse um livro de contabilidade, poderia comprar um livro de direito por R$80. Neste mês, cem clientes participaram da promoção e compraram os dois livros. Além disso, 50 clientes compraram apenas o livro de contabilidade e 50 compraram apenas o livro de direito. Assinale a opção que indica a Receita Bruta da livraria em 30/09/2024.", "alternativas": {"a": "R$28.000.", "b": "R$42.000.", "c": "R$46.000.", "d": "R$54.000.", "e": "R$56.000."}, "gabarito": "C", "comentario": "A alternativa correta é a letra C: R$46.000.. Receitas aumentam o patrimônio líquido por aumento de ativos ou redução de passivos, exceto contribuições dos sócios. Despesas reduzem o patrimônio líquido por redução de ativos ou aumento de passivos, exceto distribuições aos sócios."}, {"numero": 52, "banca": "FGV", "concurso": "AJ (TJ RR)/TJ RR/Contabilidade/2024", "enunciado": "Em 2023, uma entidade realizou transações com instrumentos financeiros derivativos, que foram consideradas complexas. A entidade optou por não incluir essas transações em suas demonstrações contábeis, de modo a tornar mais fácil a compreensão das informações contidas em suas demonstrações. Em relação à aplicação direta das características qualitativas das informações financeiras úteis, é correto afirmar que as demonstrações contábeis", "alternativas": {"a": "estão de acordo com a relevância.", "b": "estão de acordo com a prudência.", "c": "não estão de acordo com a tempestividade.", "d": "não estão de acordo com a representação fidedigna.", "e": "estão de acordo com a capacidade de verificação."}, "gabarito": "D", "comentario": "A alternativa correta é a letra D: não estão de acordo com a representação fidedigna.. Ativo é recurso econômico presente controlado pela entidade como resultado de eventos passados. O foco é o controle do recurso, não necessariamente a propriedade legal."}, {"numero": 53, "banca": "FGV", "concurso": "AGP (Pref Vitória)/Pref Vitória/Contador/2024", "enunciado": "De acordo com a NBC TG Estrutura Conceitual - Estrutura Conceitual para Relatório Financeiro, os investidores, credores por empréstimos, e outros credores, existentes e potenciais, são os principais usuários aos quais se destinam relatórios financeiros para fins gerais. Em relação às informações fornecidas por estes relatórios aos usuários primários, é correto afirmar que os relatórios", "alternativas": {"a": "fornecem todas as informações de que esses usuários necessitam.", "b": "buscam fornecer todas as informações de que esses usuários necessitam, sendo que nem sempre é possível.", "c": "não fornecem todas as informações de que esses usuários necessitam, no entanto, as normas contábeis estão sendo aprimoradas para que isso aconteça.", "d": "não fornecem e nem podem fornecer todas as informações de que esses usuários necessitam, de modo que eles precisam considerar outras fontes.", "e": "não fornecem e nem podem fornecer todas as informações de que esses usuários necessitam, de modo que eles precisam tirar as suas conclusões com base no que os relatórios divulgam."}, "gabarito": "D", "comentario": "A alternativa correta é a letra D: não fornecem e nem podem fornecer todas as informações de que esses usuários necessitam, de modo que eles precisam considerar outras fontes.. Os usuários primários são investidores, credores por empréstimos e outros credores, existentes e potenciais. A administração não é usuária primária, pois pode obter internamente as informações de que necessita."}, {"numero": 54, "banca": "FGV", "concurso": "AGP (Pref Vitória)/Pref Vitória/Contador/2024", "enunciado": "De acordo com a NBC TG Estrutura Conceitual - Estrutura Conceitual para Relatório Financeiro, o custo histórico de um ativo é ajustado ao longo do tempo para refletir, quando aplicável, certas condições. Assinale a opção que não reflete uma dessas condições.", "alternativas": {"a": "A integralização do capital social, com reservas de lucros, que havia sido subscrito.", "b": "Os pagamentos recebidos que extinguem a totalidade ou parte do ativo.", "c": "O consumo da totalidade ou parte do recurso econômico que constitui o ativo.", "d": "A provisão de juros para refletir componentes de financiamento do ativo.", "e": "O efeito de eventos que fazem com que a totalidade ou parte do custo histórico do ativo não seja mais recuperável."}, "gabarito": "A", "comentario": "A alternativa correta é a letra A: A integralização do capital social, com reservas de lucros, que havia sido subscrito.. Tempestividade significa disponibilizar informações aos tomadores de decisão a tempo de influenciar suas decisões. Quando a informação chega tarde, sua utilidade diminui."}, {"numero": 55, "banca": "FGV", "concurso": "Bach (CFC)/CFC/2º Exame de Suficiência/2024", "enunciado": "Considerado um fato relevante divulgado por uma empresa de capital aberto, a perspectiva de alto potencial de entrada de benefícios econômicos futuros na aquisição de um novo ativo operacional resultou em um aumento (de R$ 4,50 para R$ 60,50 no valor nominal) de suas ações negociadas em Bolsa de Valores no país e no exterior. Dois meses depois, verificou-se que tal fato relevante era falso e que o acionista majoritário tinha conhecimento disso, o que resultou em prejuízo de bilhões de reais para entidade e foi tratado como crime contra o mercado financeiro. Na divulgação inicial do fato relevante, a característica qualitativa fundamental que deixou de ser observada pela entidade foi a", "alternativas": {"a": "comparabilidade.", "b": "prudência.", "c": "verificabilidade.", "d": "representação fidedigna."}, "gabarito": "D", "comentario": "A alternativa correta é a letra D: representação fidedigna.. A representação fidedigna exige informação completa, neutra e isenta de erros. Informação falsa, incompleta ou enviesada não representa fielmente o fenômeno econômico."}, {"numero": 56, "banca": "FGV", "concurso": "Bach (CFC)/CFC/2º Exame de Suficiência/2024", "enunciado": "Um investidor está analisando as demonstrações contábeis de uma sociedade empresária. O investidor tem disponível, para a sua análise, as demonstrações referentes a 31/12/2023, mas não as dos exercícios anteriores. Nesse caso, o investidor não poderá verificar a seguinte característica qualitativa:", "alternativas": {"a": "relevância.", "b": "tempestividade.", "c": "comparabilidade.", "d": "compreensibilidade."}, "gabarito": "C", "comentario": "A alternativa correta é a letra C: comparabilidade.. A questão cobra conceito do CPC 00. A resolução exige identificar a palavra-chave do enunciado e relacioná-la ao conceito técnico correto."}, {"numero": 57, "banca": "FGV", "concurso": "Bach (CFC)/CFC/2º Exame de Suficiência/2024", "enunciado": "Leia o fragmento a seguir: Passivo é a obrigação _____ da entidade de transferir um recurso econômico como resultado de eventos _____. Assinale a opção cujos itens completam corretamente as lacunas do fragmento acima.", "alternativas": {"a": "futura / presente", "b": "futura / passados", "c": "presente / futuros", "d": "presente / passados"}, "gabarito": "D", "comentario": "A alternativa correta é a letra D: presente / passados. Ativo é recurso econômico presente controlado pela entidade como resultado de eventos passados. O foco é o controle do recurso, não necessariamente a propriedade legal."}, {"numero": 58, "banca": "FGV", "concurso": "Bach (CFC)/CFC/2º Exame de Suficiência/2024", "enunciado": "A NBC TG Estrutura Conceitual – ESTRUTURA CONCEITUAL PARA RELATÓRIO FINANCEIRO indica o conceito financeiro e o conceito físico de capital. De acordo com a norma, a seleção do conceito apropriado de capital pela entidade deve ser baseada", "alternativas": {"a": "na forma jurídica dos atos e fatos contábeis.", "b": "na essência econômica dos atos e fatos contábeis.", "c": "nas determinações das entidades reguladoras.", "d": "nas necessidades dos usuários de suas demonstrações contábeis."}, "gabarito": "D", "comentario": "A alternativa correta é a letra D: nas necessidades dos usuários de suas demonstrações contábeis.. Na manutenção do capital financeiro, o lucro só existe se os ativos líquidos finais excederem os ativos líquidos iniciais, excluídas contribuições e distribuições aos sócios."}, {"numero": 59, "banca": "FGV", "concurso": "Cont (CGM RJ)/Pref RJ/2023", "enunciado": "O conceito de prudência está presente na Estrutura Conceitual. Nota-se que ativos e receitas não devem estar superavaliados, da mesma forma que passivos e despesas não devem estar subavaliados. Nesse sentido, o conceito se aplica para a situação de maior incerteza para a mensuração de um(a):", "alternativas": {"a": "mercadoria para estoque;", "b": "empréstimo bancário pré-fixado;", "c": "aplicação financeira pré-fixada;", "d": "estimativa de provisão judicial;", "e": "ativo imobilizado."}, "gabarito": "D", "comentario": "A alternativa correta é a letra D: estimativa de provisão judicial;. A representação fidedigna exige informação completa, neutra e isenta de erros. Informação falsa, incompleta ou enviesada não representa fielmente o fenômeno econômico."}, {"numero": 60, "banca": "FGV", "concurso": "Cont (CGM RJ)/Pref RJ/2023", "enunciado": "Uma empresa atualizou seu sistema contábil. Após a finalização de implementação do novo sistema, o plano de contas não mais segregava as contas a receber de controladas e coligadas. Nesse caso, a mudança ocorrida afeta a:", "alternativas": {"a": "tempestividade, devido ao atraso na divulgação da informação contábil, prejudicando a sua confiabilidade;", "b": "materialidade, devido à informação ser incompleta e fora dos limites de materialidade e custo;", "c": "consistência, pois a apresentação e a classificação de itens nas demonstrações contábeis devem ser mantidas de um período para outro;", "d": "compensação de valores, pois a entidade deve compensar ativos e passivos ou receitas e despesas para divulgação ao usuário interno;", "e": "uniformidade, pois permite aos usuários identificar e compreender similaridades e diferenças."}, "gabarito": "C", "comentario": "A alternativa correta é a letra C: consistência, pois a apresentação e a classificação de itens nas demonstrações contábeis devem ser mantidas de um período para outro;. A questão cobra conceito do CPC 00. A resolução exige identificar a palavra-chave do enunciado e relacioná-la ao conceito técnico correto."}, {"numero": 61, "banca": "FGV", "concurso": "AJ (TJ RN)/TJ RN/Administrativa/Contabilidade/2023", "enunciado": "A comunicação efetiva de informações nas demonstrações contábeis as torna mais relevantes e contribui para uma representação fidedigna de ativos, passivos, patrimônio líquido, receitas e despesas da entidade. Em se tratando dos preceitos das normas CPC 00 e CPC 26, é correto afirmar que:", "alternativas": {"a": "a agregação torna as informações mais úteis ao resumir grande quantidade de detalhes. Contudo, deve-se observar um limite de 10%, de modo que as informações relevantes não sejam obscurecidas;", "b": "a entidade deve apresentar separadamente nas demonstrações contábeis cada classe material de itens semelhantes que ultrapassem o limite de 10%;", "c": "a entidade não precisa fornecer uma divulgação específica, requerida por Pronunciamento Técnico, Interpretação ou Orientação do CPC, se a informação resultante da divulgação não for material;", "d": "a comunicação efetiva de informações nas demonstrações contábeis requer concentrar-se em regras e objetivos de divulgação e apresentação em vez de concentrar-se em princípios;", "e": "os relatórios financeiros para fins gerais fornecem todas as informações de que necessitam investidores, credores por empréstimos e outros credores, existentes e potenciais."}, "gabarito": "C", "comentario": "A alternativa correta é a letra C: a entidade não precisa fornecer uma divulgação específica, requerida por Pronunciamento Técnico, Interpretação ou Orientação do CPC, se a informação resultante da divulgação não for material;. A representação fidedigna exige informação completa, neutra e isenta de erros. Informação falsa, incompleta ou enviesada não representa fielmente o fenômeno econômico."}, {"numero": 62, "banca": "FGV", "concurso": "TecGes Admin (ALEMA)/ALEMA/Contador/\"Sem Especialidade\"/2023", "enunciado": "De acordo com a NBC TG Estrutura Conceitual- Estrutura Conceitual para Relatório Financeiro, os investidores, credores por empréstimos e outros credores, existentes e potenciais, representam os principais usuários aos quais se destinam os relatórios financeiros para fins gerais. De acordo com a norma, a administração da entidade que reporta não é considerada usuário primário, uma vez que", "alternativas": {"a": "pode obter internamente as informações financeiras de que precisa.", "b": "é a responsável direta pela elaboração destes relatórios financeiros.", "c": "tem necessidades de informação diferentes e possivelmente conflitantes em relação aos demais usuários.", "d": "sua necessidade é mais restrita e específica, enquanto os relatórios financeiros são mais abrangentes.", "e": "trabalha com representações exatas, enquanto os relatórios financeiros baseiam-se em estimativas, julgamentos e modelos."}, "gabarito": "A", "comentario": "A alternativa correta é a letra A: pode obter internamente as informações financeiras de que precisa.. Os usuários primários são investidores, credores por empréstimos e outros credores, existentes e potenciais. A administração não é usuária primária, pois pode obter internamente as informações de que necessita."}, {"numero": 63, "banca": "FGV", "concurso": "TecGes Admin (ALEMA)/ALEMA/Contador/\"Sem Especialidade\"/2023", "enunciado": "De acordo com a NBC TG Estrutura Conceitual- Estrutura Conceitual para Relatório Financeiro, ativo é um direito que tem o potencial de produzir benefícios econômicos, presente e controlado pela entidade, como resultado de eventos passados. As opções a seguir indicam exemplos de direitos que representam ativos reconhecidos pela Contabilidade e que correspondem à obrigação de outra parte, à exceção de uma. Assinale-a.", "alternativas": {"a": "Direitos de receber caixa.", "b": "Direitos de receber produtos ou serviços.", "c": "Direitos de influenciar a tomada de decisões estratégicas.", "d": "Direitos de trocar recursos econômicos com outra parte em condições favoráveis.", "e": "Direitos de beneficiar-se de obrigação de outra parte para transferir um recurso econômico se ocorrer evento futuro incerto especificado."}, "gabarito": "C", "comentario": "A alternativa correta é a letra C: Direitos de influenciar a tomada de decisões estratégicas.. Ativo é recurso econômico presente controlado pela entidade como resultado de eventos passados. O foco é o controle do recurso, não necessariamente a propriedade legal."}, {"numero": 64, "banca": "FGV", "concurso": "AL (CAM DEP)/CAM DEP/Contador/2023", "enunciado": "De acordo com o Pronunciamento Técnico CPC 00 (R2) - Estrutura Conceitual para Relatório Financeiro, ativo é um recurso econômico presente controlado pela entidade como resultado de eventos passados. Um recurso econômico é um direito que tem o potencial de produzir benefícios econômicos. Para que esse potencial exista", "alternativas": {"a": "o seu valor justo deve ser mensurado com objetividade.", "b": "deve haver uma contrapartida correspondente no passivo.", "c": "precisa ser provável que o direito irá produzir benefícios econômicos futuros.", "d": "precisa ser certo que o direito irá produzir benefícios econômicos futuros.", "e": "é necessário que, em ao menos uma circunstância, o direito irá produzir para a entidade benefícios econômicos além daqueles disponíveis para todas as outras partes."}, "gabarito": "E", "comentario": "A alternativa correta é a letra E: é necessário que, em ao menos uma circunstância, o direito irá produzir para a entidade benefícios econômicos além daqueles disponíveis para todas as outras partes.. Ativo é recurso econômico presente controlado pela entidade como resultado de eventos passados. O foco é o controle do recurso, não necessariamente a propriedade legal."}, {"numero": 65, "banca": "FGV", "concurso": "AL (CAM DEP)/CAM DEP/Contador/2023", "enunciado": "Em relação às bases de mensuração para reconhecimento dos elementos nas demonstrações contábeis, assinale a opção que indica apenas as que refletem valores de saída.", "alternativas": {"a": "Custo corrente e valor justo.", "b": "Valor justo e valor realizável.", "c": "Custo corrente e custo histórico.", "d": "Valor realizável e custo corrente.", "e": "Custo histórico e valor realizável."}, "gabarito": "B", "comentario": "A alternativa correta é a letra B: Valor justo e valor realizável.. Mensuração é o processo de atribuir valor monetário aos elementos reconhecidos. As bases incluem custo histórico e valores atuais, como valor justo, valor em uso, valor de cumprimento e custo corrente."}, {"numero": 66, "banca": "FGV", "concurso": "AGAS (FHEMIG)/FHEMIG/Contador/2023", "enunciado": "De acordo com o Pronunciamento Técnico CPC 00 (R2) - Estrutura Conceitual para Relatório Financeiro, entre as finalidades da Estrutura Conceitual está a de auxiliar o desenvolvimento das normas internacionais de contabilidade para que tenham base em conceitos consistentes. Quando um pronunciamento possui requisitos que divergem de aspectos da Estrutura Conceitual, deve-se", "alternativas": {"a": "seguir os requisitos da Estrutura Conceitual, em detrimento ao Pronunciamento.", "b": "escolher quais requisitos deseja seguir e explicar a escolha em notas explicativas.", "c": "seguir os requisitos do Pronunciamento específico, em detrimento da Estrutura Conceitual.", "d": "analisar as divergências com o auditor independente e definir o tratamento aplicável, de acordo com o objetivo da administração.", "e": "apresentar, simultaneamente, uma demonstração contábil de acordo com os requisitos do Pronunciamento e outra de acordo com os requisitos da Estrutura Conceitual."}, "gabarito": "C", "comentario": "A alternativa correta é a letra C: seguir os requisitos do Pronunciamento específico, em detrimento da Estrutura Conceitual.. A questão cobra conceito do CPC 00. A resolução exige identificar a palavra-chave do enunciado e relacioná-la ao conceito técnico correto."}, {"numero": 67, "banca": "FGV", "concurso": "Per (PC AM)/PC AM/4ª Classe/Contabilidade/2022", "enunciado": "Entre as características qualitativas de informações financeiras úteis está a representação fidedigna, que deve ser completa, neutra e isenta de erros. Assinale a opção correta em relação a esses atributos, de acordo com o Pronunciamento Técnico CPC 00 (R2) – Estrutura Conceitual para Relatório Financeiro.", "alternativas": {"a": "O exercício da neutralidade não permite a superavaliação de ativos ou receitas ou a subavaliação de passivos ou despesas.", "b": "O exercício da representação isenta de erros implica em classificar, caracterizar e apresentar informações de modo claro e conciso.", "c": "A representação neutra implica em informações que não exercem influência sobre o comportamento e as decisões dos usuários.", "d": "A representação isenta de erros deve ser precisa, de modo que os valores monetários que não podem ser observados diretamente devem ser estimados apenas quando há certeza na mensuração.", "e": "A representação completa inclui todas as informações necessárias para que o usuário compreenda os fenômenos que estão sendo representados, inclusive todas as descrições e explicações necessárias."}, "gabarito": "E", "comentario": "A alternativa correta é a letra E: A representação completa inclui todas as informações necessárias para que o usuário compreenda os fenômenos que estão sendo representados, inclusive todas as descrições e explicações necessárias.. A representação fidedigna exige informação completa, neutra e isenta de erros. Informação falsa, incompleta ou enviesada não representa fielmente o fenômeno econômico."}, {"numero": 68, "banca": "FGV", "concurso": "Per (PC AM)/PC AM/4ª Classe/Contabilidade/2022", "enunciado": "De acordo com o Pronunciamento Técnico CPC 00 (R2) – Estrutura Conceitual para Relatório Financeiro, as demonstrações contábeis fornecem informações sobre transações e outros eventos observados do ponto de vista", "alternativas": {"a": "dos investidores.", "b": "dos credores existentes.", "c": "dos credores potenciais.", "d": "da entidade que reporta.", "e": "das autoridades governamentais."}, "gabarito": "D", "comentario": "A alternativa correta é a letra D: da entidade que reporta.. A questão cobra conceito do CPC 00. A resolução exige identificar a palavra-chave do enunciado e relacioná-la ao conceito técnico correto."}, {"numero": 69, "banca": "FGV", "concurso": "AFCTE (Sefaz AM)/SEFAZ AM/2022", "enunciado": "De acordo com o Pronunciamento Técnico CPC 00 (R2) - Estrutura Conceitual para Relatório Financeiro, muitos investidores, credores por empréstimos e outros credores, existentes e potenciais, não podem exigir que as entidades forneçam informações diretamente a eles, sendo, portanto, os principais usuários aos quais se destinam relatórios financeiros para fins gerais. Nesse sentido, em relação aos relatório
